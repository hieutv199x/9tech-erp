name: 9tech-erp

services:
  odoo:
    image: ${APP_IMAGE}
    restart: unless-stopped
    ports:
      - "${ODOO_HTTP_PORT:-8069}:8069"
    environment:
      HOST: ${DB_HOST}
      PORT: ${DB_PORT:-5432}
      USER: ${DB_USERNAME}
      PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      DB_NAME: ${DB_DATABASE}
    command: >-
      odoo -c /etc/odoo/odoo.conf
      --db_host=${DB_HOST}
      --db_port=${DB_PORT:-5432}
      --db_user=${DB_USERNAME}
      --db_password=${DB_PASSWORD}
      --db-filter=${ODOO_DB_FILTER:-.*}
      --without-demo
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8069/web/login', timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s
    volumes:
      - odoo_data:/var/lib/odoo
    networks:
      - erp_net

networks:
  erp_net:
    driver: bridge

volumes:
  odoo_data:
