version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: odoo_db
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_DB=odoo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - odoo_network

  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: odoo_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - HOST=db
      - PORT=5432
      - USER=odoo
      - PASSWORD=odoo
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    volumes:
      - ./addons:/mnt/extra-addons
      - odoo_data:/var/lib/odoo
    ports:
      - "8069:8069"   # Main Odoo port
      - "8071:8071"   # XMLRPCS
      - "8072:8072"   # Longpolling
    command: ["odoo", "--dev=all"]
    networks:
      - odoo_network

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@9tech.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - odoo_network

volumes:
  postgres_data:
    driver: local
  odoo_data:
    driver: local

networks:
  odoo_network:
    driver: bridge
