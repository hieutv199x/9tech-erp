name: Build and Deploy Odoo to VPS

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: hieutv199x/9tech-erp
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_PORT: ${{ secrets.VPS_PORT }}

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TARGETARCH=amd64

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  test:
    name: Test Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            echo "🚀 Starting deployment..."
            
            # Navigate to project directory
            cd /home/ubuntu/odoo || exit 1
            
            # Pull latest changes
            echo "📥 Pulling latest code..."
            git pull origin main
            
            # Stop existing containers
            echo "⛔ Stopping existing containers..."
            docker-compose down || true
            
            # Build new image
            echo "🔨 Building Docker image..."
            docker-compose build --no-cache
            
            # Start services
            echo "🚀 Starting services..."
            docker-compose up -d
            
            # Wait for services to be ready
            echo "⏳ Waiting for services to be ready..."
            sleep 10
            
            # Initialize database (only on first deploy or if needed)
            echo "📊 Checking database..."
            docker-compose exec -T odoo odoo -d odoo_db --no-http 2>/dev/null || {
              echo "📊 Initializing database..."
              docker-compose exec -T odoo odoo -d odoo_db -i base,sale,stock,account --without-demo=all --stop-after-init
            }
            
            # Health check
            echo "🏥 Running health checks..."
            for i in {1..30}; do
              if curl -s http://localhost:8069 > /dev/null; then
                echo "✅ Odoo is running!"
                break
              fi
              echo "⏳ Waiting for Odoo... ($i/30)"
              sleep 2
            done
            
            # Cleanup
            echo "🧹 Cleaning up..."
            docker system prune -f
            
            echo "✅ Deployment completed successfully!"

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - name: Send success notification
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Odoo is now available at: http://${{ secrets.VPS_HOST }}:8069"

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "❌ Deployment failed!"
