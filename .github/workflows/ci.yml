name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-config:
    name: Validate Deploy Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate production compose rendering
        run: |
          cat > /tmp/prod.env <<EOF
          APP_IMAGE=example/9tech-erp:main
          DB_HOST=192.168.172.51
          DB_PORT=5432
          DB_USERNAME=erp_odoo
          DB_PASSWORD=example-password
          DB_DATABASE=erp
          ODOO_DB_FILTER=.*
          ODOO_HTTP_PORT=8069
          EOF
          docker compose --env-file /tmp/prod.env -f deploy/docker-compose.prod.yml config >/dev/null

      - name: Validate deploy shell scripts syntax
        run: |
          bash -n deploy/remote-deploy.sh
          bash -n deploy/vps-bootstrap.sh
          bash -n docker/entrypoint.sh

  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "check custom_addons addons odoo"

  dependency-scan:
    name: Dependency Scan (pip-audit)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pip-audit
        run: pip install --upgrade pip pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r requirements.txt -f json -o pip-audit-report.json

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  filesystem-scan:
    name: Filesystem Scan (Trivy)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
